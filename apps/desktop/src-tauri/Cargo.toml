[package]
name = "matrix-desktop-app"
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace]

[lib]
name = "matrix_desktop_app"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
dirs = "6"
futures-util = "0.3"
matrix-desktop-auth = { path = "../../../crates/matrix-desktop-auth" }
matrix-desktop-backend = { path = "../../../crates/matrix-desktop-backend" }
matrix-desktop-key = { path = "../../../crates/matrix-desktop-key" }
matrix-desktop-state = { path = "../../../crates/matrix-desktop-state" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
tempfile = "3"
