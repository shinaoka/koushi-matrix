[package]
name = "koushi-desktop"
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace]

[lib]
name = "koushi_desktop"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
dirs = "6"
futures-util = "0.3"
matrix-desktop-sdk = { path = "../../../crates/matrix-desktop-sdk" }
matrix-desktop-backend = { path = "../../../crates/matrix-desktop-backend" }
matrix-desktop-core = { path = "../../../crates/matrix-desktop-core" }
matrix-desktop-key = { path = "../../../crates/matrix-desktop-key" }
matrix-desktop-state = { path = "../../../crates/matrix-desktop-state" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-notification = "2.3.3"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
tempfile = "3"

# cargo-machete ignore list: these dependencies are not directly referenced in
# source code but are required for correct link-time behavior or transitive
# feature resolution. Do not remove them without verifying the build still
# works end-to-end.
#
# futures-util: used transitively; cargo-machete reports false positive.
# matrix-desktop-key: ensures key crate features are included in the final
#   link. The transport adapter itself does not call key APIs directly
#   (REPOSITORY_RULES boundary), but the linked runtime binary needs the key
#   crate compiled in.
# matrix-desktop-sdk: similarly, included for link completeness; the adapter
#   uses CoreRuntime (from matrix-desktop-core) which internalizes SDK calls.
[package.metadata.cargo-machete]
ignored = ["futures-util", "matrix-desktop-key", "matrix-desktop-sdk"]
