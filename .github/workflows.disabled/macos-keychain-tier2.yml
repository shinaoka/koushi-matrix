# Disabled 2026-06-16: hosted macOS Keychain CI is paused after failed runs.
# Move this file back to `.github/workflows/` only after the lane is re-enabled.
name: macOS Keychain Tier 2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  temporary-keychain:
    name: Temporary Keychain round trip
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Rust toolchain
        run: rustup show

      - name: Prepare standalone key crate
        run: |
          rm -rf "$RUNNER_TEMP/matrix-desktop-key"
          mkdir -p "$RUNNER_TEMP/matrix-desktop-key"
          cp -R crates/matrix-desktop-key/. "$RUNNER_TEMP/matrix-desktop-key/"

      - name: Run generic credential backend contract
        run: cargo test --manifest-path "$RUNNER_TEMP/matrix-desktop-key/Cargo.toml" credential_backend

      - name: Run macOS temporary Keychain proof
        env:
          MATRIX_DESKTOP_MACOS_KEYCHAIN_QA: "1"
        run: cargo test --manifest-path "$RUNNER_TEMP/matrix-desktop-key/Cargo.toml" credential_backend_macos_temporary_keychain_round_trip_is_env_gated -- --nocapture
