<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Inter, system-ui, sans-serif">
  <rect width="760" height="560" fill="#ffffff"/>
  <text x="24" y="34" font-size="20" font-weight="800" fill="#0F1B2D">Kagome — proposed blue palette (semantic tokens)</text>
  <text x="24" y="56" font-size="12" fill="#5B6B82">Differentiated from Element (green). Light is default; dark via [data-theme="dark"] + prefers-color-scheme.</text>

  <text x="24" y="92" font-size="13" font-weight="700" fill="#0F1B2D">token</text>
  <text x="250" y="92" font-size="13" font-weight="700" fill="#0F1B2D">LIGHT</text>
  <text x="510" y="92" font-size="13" font-weight="700" fill="#0F1B2D">DARK</text>
  <line x1="24" y1="100" x2="736" y2="100" stroke="#E3E8F0"/>

  <!-- rows: role | light swatch+hex | dark swatch+hex -->
  <g font-size="12">
    <!-- brand -->
    <text x="24" y="128" fill="#0F1B2D" font-weight="600">--brand (primary action)</text>
    <rect x="250" y="114" width="150" height="22" rx="4" fill="#2D6FEF"/><text x="408" y="129" fill="#5B6B82">#2D6FEF</text>
    <rect x="510" y="114" width="150" height="22" rx="4" fill="#5C8DF6"/><text x="668" y="129" fill="#5B6B82">#5C8DF6</text>
    <!-- brand-weak -->
    <text x="24" y="160" fill="#0F1B2D" font-weight="600">--brand-weak (selection bg)</text>
    <rect x="250" y="146" width="150" height="22" rx="4" fill="#E7F0FE"/><text x="408" y="161" fill="#5B6B82">#E7F0FE</text>
    <rect x="510" y="146" width="150" height="22" rx="4" fill="#1B2942"/><text x="668" y="161" fill="#5B6B82">#1B2942</text>
    <!-- rail -->
    <text x="24" y="192" fill="#0F1B2D" font-weight="600">--rail (space rail bg)</text>
    <rect x="250" y="178" width="150" height="22" rx="4" fill="#16213E"/><text x="408" y="193" fill="#5B6B82">#16213E</text>
    <rect x="510" y="178" width="150" height="22" rx="4" fill="#0A111F"/><text x="668" y="193" fill="#5B6B82">#0A111F</text>
    <!-- sidebar -->
    <text x="24" y="224" fill="#0F1B2D" font-weight="600">--sidebar (room list bg)</text>
    <rect x="250" y="210" width="150" height="22" rx="4" fill="#F5F7FB" stroke="#E3E8F0"/><text x="408" y="225" fill="#5B6B82">#F5F7FB</text>
    <rect x="510" y="210" width="150" height="22" rx="4" fill="#111A2B"/><text x="668" y="225" fill="#5B6B82">#111A2B</text>
    <!-- surface -->
    <text x="24" y="256" fill="#0F1B2D" font-weight="600">--surface (timeline bg)</text>
    <rect x="250" y="242" width="150" height="22" rx="4" fill="#FFFFFF" stroke="#E3E8F0"/><text x="408" y="257" fill="#5B6B82">#FFFFFF</text>
    <rect x="510" y="242" width="150" height="22" rx="4" fill="#0E1726"/><text x="668" y="257" fill="#5B6B82">#0E1726</text>
    <!-- surface-hover -->
    <text x="24" y="288" fill="#0F1B2D" font-weight="600">--surface-hover</text>
    <rect x="250" y="274" width="150" height="22" rx="4" fill="#EEF2F8" stroke="#E3E8F0"/><text x="408" y="289" fill="#5B6B82">#EEF2F8</text>
    <rect x="510" y="274" width="150" height="22" rx="4" fill="#1A2740"/><text x="668" y="289" fill="#5B6B82">#1A2740</text>
    <!-- text -->
    <text x="24" y="320" fill="#0F1B2D" font-weight="600">--text</text>
    <rect x="250" y="306" width="150" height="22" rx="4" fill="#0F1B2D"/><text x="408" y="321" fill="#5B6B82">#0F1B2D</text>
    <rect x="510" y="306" width="150" height="22" rx="4" fill="#E6ECF5"/><text x="668" y="321" fill="#5B6B82">#E6ECF5</text>
    <!-- text-muted -->
    <text x="24" y="352" fill="#0F1B2D" font-weight="600">--text-muted</text>
    <rect x="250" y="338" width="150" height="22" rx="4" fill="#5B6B82"/><text x="408" y="353" fill="#5B6B82">#5B6B82</text>
    <rect x="510" y="338" width="150" height="22" rx="4" fill="#93A0B4"/><text x="668" y="353" fill="#5B6B82">#93A0B4</text>
    <!-- line -->
    <text x="24" y="384" fill="#0F1B2D" font-weight="600">--line (borders)</text>
    <rect x="250" y="370" width="150" height="22" rx="4" fill="#E3E8F0"/><text x="408" y="385" fill="#5B6B82">#E3E8F0</text>
    <rect x="510" y="370" width="150" height="22" rx="4" fill="#1E2A40"/><text x="668" y="385" fill="#5B6B82">#1E2A40</text>
    <!-- unread -->
    <text x="24" y="416" fill="#0F1B2D" font-weight="600">--unread (badge)</text>
    <rect x="250" y="402" width="150" height="22" rx="4" fill="#2D6FEF"/><text x="408" y="417" fill="#5B6B82">#2D6FEF</text>
    <rect x="510" y="402" width="150" height="22" rx="4" fill="#5C8DF6"/><text x="668" y="417" fill="#5B6B82">#5C8DF6</text>
    <!-- mention -->
    <text x="24" y="448" fill="#0F1B2D" font-weight="600">--mention / --danger</text>
    <rect x="250" y="434" width="150" height="22" rx="4" fill="#E5484D"/><text x="408" y="449" fill="#5B6B82">#E5484D</text>
    <rect x="510" y="434" width="150" height="22" rx="4" fill="#F2575C"/><text x="668" y="449" fill="#5B6B82">#F2575C</text>
    <!-- success -->
    <text x="24" y="480" fill="#0F1B2D" font-weight="600">--success (presence/online)</text>
    <rect x="250" y="466" width="150" height="22" rx="4" fill="#1A9E6C"/><text x="408" y="481" fill="#5B6B82">#1A9E6C</text>
    <rect x="510" y="466" width="150" height="22" rx="4" fill="#34B988"/><text x="668" y="481" fill="#5B6B82">#34B988</text>
  </g>

  <line x1="24" y1="502" x2="736" y2="502" stroke="#E3E8F0"/>
  <text x="24" y="526" font-size="11" fill="#93A0B4">Brand is the only saturated hue in chrome; the rest is a cool slate ramp so unread/mention/presence read clearly. WCAG AA targeted for text on surface/sidebar.</text>
</svg>
