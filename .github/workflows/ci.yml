name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer runs supersede in-flight ones. Key off head_ref for PRs so that GitHub
# recomputing refs/pull/N/merge (on mergeability changes) does not spuriously
# cancel an in-flight PR run; fall back to github.ref for push events.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck / vitest / build / secret-scan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build
      - name: Secret scan
        run: npm run qa:secret-scan
      # --- Boundary enforcement (#87 Phase 0) ---
      # ESLint import-boundary rule: components must not import @tauri-apps
      # directly; no file may path-escape into src-tauri.
      - name: ESLint import boundaries
        run: npm run lint
      # Tauri adapter boundary: src-tauri must not call matrix_desktop_sdk directly.
      - name: Tauri adapter boundary check
        run: npm run lint:tauri-boundary
      # Domain-crate platform-dep deny-list: matrix-desktop-state must not gain
      # platform/OS deps (pre-seeds Phase 5 SecretStore port).
      - name: Domain-crate platform-dep check
        run: npm run lint:domain-deps

  rust:
    name: Rust (workspace / src-tauri / wasm)
    runs-on: ubuntu-latest
    env:
      # Share one target dir across the workspace and the separate src-tauri
      # cargo project so the vendored Matrix SDK / matrix-desktop-core compile
      # ONCE and are reused, instead of once per project (per
      # tensor4all/tenferro-rs CI). See #93.
      CARGO_TARGET_DIR: ${{ github.workspace }}/target-ci
    steps:
      - uses: actions/checkout@v4
        with:
          # The vendored Matrix SDK is a public submodule; recursive checkout
          # clones it over the HTTPS URL in .gitmodules without any secret.
          submodules: recursive
      - name: Install Rust toolchain (1.96.0 + wasm target)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          # Hash both Cargo.lock files (workspace root + the separate src-tauri
          # project) into the cache key and cache the shared CARGO_TARGET_DIR;
          # shared-key keeps the cache warm across branches/PRs. See #93.
          workspaces: |
            .
            apps/desktop/src-tauri
          shared-key: koushi-rust-ci
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - name: Workspace tests
        run: cargo test --workspace
      - name: Tauri DTO + IPC contract tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: wasm build check (state + search)
        run: cargo check --target wasm32-unknown-unknown -p matrix-desktop-state -p matrix-desktop-search
      # --- Dependency hygiene (#87 Phase 0) ---
      # cargo-deny: license compliance + advisory check + bans.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9
      - name: cargo-deny check
        run: cargo deny check
      # cargo-machete: detect unused Cargo.toml dependencies.
      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete@0.9.2
      - name: cargo-machete (unused deps)
        run: cargo machete
