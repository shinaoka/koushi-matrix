# cargo-deny configuration for the matrix-desktop workspace.
# See: https://embarkstudios.github.io/cargo-deny/
#
# Phase 0 (#87): encode current-correct boundaries. Rules here pass on the
# current codebase and will catch future violations. Grandfathered exceptions
# are documented inline.

[advisories]
# Audit database for known security vulnerabilities.
# yanked = "deny"  # disabled: the vendored SDK pulls in several yanked crates
#
# Grandfathered advisories: these are known issues in transitive dependencies
# (primarily the vendored Matrix Rust SDK) with no available fix. Each is
# documented with why it is accepted.
ignore = [
    # RUSTSEC-2024-0411/0412/0413/0414/0415/0416/0417/0418/0419/0420:
    # gtk-rs GTK3 bindings are unmaintained. These enter through Tauri v2's
    # Linux WebKit/GTK3 stack. They were already present in the separate
    # src-tauri lockfile; merging Tauri into the root workspace makes cargo-deny
    # see them. There is no project-local upgrade until Tauri/wry moves this
    # Linux backend off gtk3-rs.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # RUSTSEC-2024-0370: proc-macro-error is unmaintained. Tauri's gtk3 stack
    # still pulls gtk3-macros, which pulls this compile-time macro helper. No
    # runtime code path depends on it directly.
    "RUSTSEC-2024-0370",
    # RUSTSEC-2025-0075/0080/0081/0098/0100: rust-unic crates are
    # unmaintained. They enter through Tauri's urlpattern dependency, which is
    # upstream-owned.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # RUSTSEC-2026-0173: proc-macro-error2 is unmaintained. This crate is a
    # transitive dependency through aquamarine (used in matrix-sdk docs macros)
    # and matrix-pickle-derive (used by vodozemac). There is no upstream fix
    # available; the vendored SDK pins the version. This is a dev/proc-macro
    # crate that does not run in production — it only affects compile-time
    # macro expansion. Track upstream SDK upgrades to drop it.
    "RUSTSEC-2026-0173",
    # RUSTSEC-2026-0194/0195: quick-xml issues reached through plist in the
    # Tauri stack. plist currently pins a quick-xml 0.39-compatible range; the
    # fix requires an upstream plist/Tauri dependency update.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Accept the OSI-approved / permissive licenses present in the workspace.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-1-Clause",
    "ISC",
    "0BSD",
    "MIT-0",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
    # Creative Commons permissive (used by webpki-roots data sets).
    "CDLA-Permissive-2.0",
    # zlib with acknowledgement (fastdivide).
    "zlib-acknowledgement",
]

# LGPL 2.1+ is in the workspace via r-efi. r-efi is a UEFI binding used
# transitively through some system crates. It is a library with LGPL 2.1+
# static-link exception which is compatible with the product's MIT/Apache-2.0
# dual license when linked as a library (the exception permits static linking
# without triggering GPL copyleft). Allow it explicitly and review if the
# version changes.
[[licenses.exceptions]]
allow = ["LGPL-2.1-or-later"]
name = "r-efi"

# imbl / bitmaps / imbl-sized-chunks declare "MPL-2.0+" which is not a
# canonical SPDX identifier (no "+" operator exists in SPDX for MPL-2.0;
# they intend "MPL-2.0 or later"). Accept these with explicit allowances since
# MPL-2.0 is already in the allow list and the "+" is cosmetic.
[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "imbl"

[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "bitmaps"

[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "imbl-sized-chunks"

[bans]
# Check for duplicate versions of the same crate (warn, not deny, to avoid
# blocking on upstream version resolution churn in the vendored SDK).
multiple-versions = "warn"

# cargo-deny bans are dependency-graph-wide and cannot selectively allow a
# crate in one workspace member while denying it in another. The platform-dep
# boundary for koushi-state (the pure domain layer) is therefore
# enforced by scripts/check-domain-crate-platform-deps.mjs, which inspects
# that crate's Cargo.toml directly. deny.toml provides license compliance,
# advisory gating, and source integrity; per-crate layer enforcement is
# the script's responsibility.
#
# Grandfathered platform deps (NOT banned here; tracked for Phase 5 removal):
#   keyring in koushi-core and koushi-key — Phase 5 target for
#   SecretStore dependency inversion (trait SecretStore, platform adapters).
deny = []

# Explicitly allow crates that are expected in the dependency graph.
# This section is intentionally minimal for Phase 0.
skip = []

[sources]
# Only allow crates from crates.io, local path deps, and the rev-pinned SDK
# fork. The SDK was moved from submodule path deps to a git dependency in
# issue #180 so Cargo fingerprints it by rev instead of path mtimes.
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/shinaoka/matrix-rust-sdk-work.git"]
